# Portainer-Stack fuer die Synology NAS.
# Nutzt das fertig gebaute Image aus der GitHub Container Registry (GHCR).
#
# WARUM NICHT die eigene GitLab-Registry?
# Die NAS kann ihre eigenen macvlan-Container (GitLab .170, NPM .171) prinzip-
# bedingt nicht erreichen ("no route to host") - macvlan isoliert den Host von
# seinen eigenen macvlan-Interfaces. Der Docker-Daemon der NAS kommt daher nicht
# an registry.home.weichelt.de. Von JEDEM ANDEREN Host im LAN funktioniert die
# Registry dagegen problemlos.
# Loesung waere, den Reverse Proxy auf einen anderen Host (z. B. DOC90) zu legen.
#   Dann hier umstellen auf:
#   image: registry.home.weichelt.de/mawe/yt-follow-server:latest
#
# Variablen (HOST_PORT, POLL_MINUTES, TZ) haben Defaults und funktionieren daher
# auch ohne stack.env. Zum Aendern die Werte in stack.env setzen (liegt im Repo,
# damit auch die Portainer-"Repository"-Methode sie nutzen kann).

services:
  yt-follow:
    image: ghcr.io/spofastic/yt-follow-server:latest
    container_name: yt-follow
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - yt-follow-data:/app/data
      # Alternative (Synology-Bind-Mount statt benanntem Volume) – Ordner muss existieren:
      # - /volume1/docker/yt-follow/data:/app/data
    environment:
      - PORT=8080
      - POLL_MINUTES=${POLL_MINUTES:-30}
      - TZ=${TZ:-Europe/Berlin}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/state"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  yt-follow-data:

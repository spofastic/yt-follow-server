<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#cc0000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="YT Follow" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="style.css" />
    <title>YouTube Follow</title>
  </head>
  <body>
    <header>
      <h1>Meine YouTube-Abos</h1>
      <div class="actions">
        <button id="markAll" class="icon" title="Alle als gesehen markieren" aria-label="Alle gelesen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5" /></svg>
          <span id="unseenBadge" class="badge" hidden></span>
        </button>
        <button id="refresh" class="icon" title="Feeds aktualisieren" aria-label="Aktualisieren">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6" /><path d="M21.34 15.57a10 10 0 1 1-.57-8.38" /></svg>
        </button>
        <button id="manageBtn" class="icon" title="Kanäle verwalten (hinzufügen, löschen, Backup)" aria-label="Verwalten">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>
        </button>
      </div>
    </header>

    <p id="status" class="status"></p>

    <section id="channels" class="channels"></section>

    <section id="manage" class="manage" hidden>
      <div class="manage-head">
        <strong>Kanäle verwalten</strong>
        <button id="manageClose">Fertig</button>
      </div>

      <div class="manage-add">
        <input id="addInput" type="text" placeholder="Kanal-URL, @handle oder UC…-ID" autocomplete="off" autocapitalize="off" spellcheck="false" />
        <button id="addConfirm">Hinzufügen</button>
      </div>
      <p id="addStatus" class="field-status"></p>

      <div id="manageList" class="manage-list"></div>

      <div class="manage-backup">
        <button id="exportBtn" class="ghost">Backup herunterladen</button>
        <button id="importBtn" class="ghost">Backup einspielen</button>
        <input id="importFile" type="file" accept="application/json,.json" hidden />
      </div>
    </section>

    <section id="videos" class="videos"></section>

    <footer><span id="meta"></span></footer>

    <script src="app.js"></script>
  </body>
</html>
